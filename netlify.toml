# ─────────────────────────────────────────────────────────
# netlify.toml — Netlify Deployment Configuration
# ─────────────────────────────────────────────────────────
# This is a purely static site (HTML + CSS + PyScript).
# No build step is required — Netlify serves files as-is.
# ─────────────────────────────────────────────────────────

[build]
  # No build command needed (pure static site)
  publish = "."

# ── HTTP Headers ─────────────────────────────────────────
# PyScript / Pyodide requires cross-origin isolation headers
# so that SharedArrayBuffer works correctly (used by Pyodide
# for threading and memory operations).
[[headers]]
  for = "/*"
  [headers.values]
    # Required for Pyodide's SharedArrayBuffer usage
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

    # Cache busting for HTML (always fresh)
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.css"
  [headers.values]
    # CSS can be cached aggressively
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.toml"
  [headers.values]
    Cache-Control = "no-cache"

# ── Redirect — SPA fallback (not needed here, but harmless) ─
# [[redirects]]
#   from   = "/*"
#   to     = "/index.html"
#   status = 200
